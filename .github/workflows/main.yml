name: Build Compose APK (Alpha)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 拉取源码+子模块ffmpeg
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Setup Gradle（新版官方Action，消除废弃警告）
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Clean
        run: ./gradlew clean

      - name: Assemble alphaRelease 打包Alpha安装包
        run: ./gradlew :app:assembleAlphaRelease --stacktrace --info

      - name: Upload Alpha APK 上传成品APK
        uses: actions/upload-artifact@v4
        with:
          name: Alpha_Release_APK
          path: app/build/outputs/apk/alpha/*.apk
